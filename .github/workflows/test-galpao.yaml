name: Galpao Framework

on:
  push:
    branches: [main, revisao/**]
    paths:
      - "framework/galpao_fw/**"
      - ".github/workflows/test-galpao.yaml"
  pull_request:
    branches: [main]
    paths:
      - "framework/galpao_fw/**"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: framework/galpao_fw

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install --system pytest
          uv pip install --system -r requirements.txt 2>/dev/null || true

      - name: Run pipeline tests (N=1, N=2, N=3)
        run: |
          python -m pytest tests/ -v -m "not build" --tb=short

  build:
    runs-on: windows-latest
    needs: pipeline
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: framework/galpao_fw

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install --system pytest
          uv pip install --system -r requirements.txt 2>/dev/null || true

      - name: Start FreeCAD headless
        run: |
          # Expects FreeCAD installed at standard location or FREECAD_ROOT env
          $fc = "$env:FREECAD_ROOT\bin\FreeCAD.exe"
          if (!(Test-Path $fc)) {
            Write-Host "FreeCAD not found at $fc — skipping build tests"
            exit 0
          }
          Start-Process -NoNewWindow $fc -ArgumentList "--headless"

      - name: Run build tests (requires FreeCAD + MCP)
        run: |
          python -m pytest tests/ -v -m build --tb=short
